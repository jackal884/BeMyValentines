<!DOCTYPE<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine 💖</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ffd6e0, #ffeef2);
        font-family: 'Segoe UI', sans-serif;
        overflow: hidden;
        transition: background 0.4s ease;
    }

    .card {
        background: white;
        padding: 20px;
        border-radius: 20px;
        text-align: center;
        width: 90%;
        max-width: 320px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        position: relative;
    }

    img {
        width: 100%;
        border-radius: 15px;
    }

    h2 {
        color: #e63973;
    }

    .btn {
        margin: 10px;
        padding: 12px 20px;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-size: 16px;
    }

    .yes {
        background: #ff4d6d;
        color: white;
    }

    .no {
        background: #ddd;
        position: absolute;
        transition: transform 0.25s ease;
    }

    .controls {
        position: fixed;
        bottom: 15px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .color-btn {
        width: 25px;
        height: 25px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
    }

</style>
</head>

<body>

<div class="card" id="card">
    <img src="https://picsum.photos/300/200" alt="img">
    <h2>Will you be my Valentine? ❤️</h2>

    <button class="btn yes" onclick="yesClick()">Yes 💖</button>
    <button class="btn no" id="noBtn">No 😢</button>
</div>

<!-- Background Controls -->
<div class="controls">
    <input type="color" onchange="setCustomColor(this.value)">
    <button class="color-btn" style="background:#ffd6e0" onclick="setBG('#ffd6e0','#ffeef2')"></button>
    <button class="color-btn" style="background:#cdb4db" onclick="setBG('#cdb4db','#ffc8dd')"></button>
    <button class="color-btn" style="background:#a2d2ff" onclick="setBG('#a2d2ff','#bde0fe')"></button>
    <button class="color-btn" style="background:#d8f3dc" onclick="setBG('#d8f3dc','#b7e4c7')"></button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const noBtn = document.getElementById("noBtn");
const card = document.getElementById("card");

// SAFE movement (always inside card)
function moveButton() {
    const cardRect = card.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();

    const maxX = card.clientWidth - btnRect.width - 20;
    const maxY = card.clientHeight - btnRect.height - 20;

    const x = Math.random() * maxX - (card.clientWidth/2 - btnRect.width/2);
    const y = Math.random() * maxY - (card.clientHeight/2 - btnRect.height/2);

    noBtn.style.transform = `translate(${x}px, ${y}px)`;
}

// Desktop + Mobile safe triggers
noBtn.addEventListener("mouseenter", moveButton);
noBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveButton();
});

// YES click
function yesClick() {
    card.innerHTML = `
        <h2>YAYYY 😭❤️</h2>
        <p>You just made my day 💖</p>
    `;

    confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 }
    });
}

// Background functions
function setBG(c1, c2) {
    document.body.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
}

function setCustomColor(color) {
    document.body.style.background = color;
}
</script>

</body>
</html>
