<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #ffeef2);
    overflow: hidden;
    transition: background 0.4s ease;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    width: 90%;
    max-width: 320px;
    position: relative;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
}

h2 { color: #e63973; }

.btn {
    margin: 10px;
    padding: 12px 20px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-size: 16px;
}

.yes {
    background: #ff4d6d;
    color: white;
}

.no {
    background: #ddd;
    position: absolute;
    transition: transform 0.25s ease, scale 0.2s ease;
}

/* emoji animation */
.emoji {
    position: fixed;
    font-size: 24px;
    animation: floatUp 2s linear forwards;
    pointer-events: none;
}

@keyframes floatUp {
    0% {opacity: 1; transform: translateY(0);}
    100% {opacity: 0; transform: translateY(-150px);}
}

.message {
    font-size: 14px;
    color: #555;
    margin-top: 10px;
    min-height: 30px;
}

/* background controls */
.controls {
    position: fixed;
    bottom: 15px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
}

.color-btn {
    width: 25px;
    height: 25px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card" id="card">
    <h2>Will you be my Valentine? ❤️</h2>

    <button class="btn yes" onclick="yesClick()">Yes 💖</button>
    <button class="btn no" id="noBtn">No 😢</button>

    <div class="message" id="msg"></div>
</div>

<!-- background controls -->
<div class="controls">
    <input type="color" onchange="setCustomColor(this.value)">
    <button class="color-btn" style="background:#ffd6e0" onclick="setBG('#ffd6e0','#ffeef2')"></button>
    <button class="color-btn" style="background:#cdb4db" onclick="setBG('#cdb4db','#ffc8dd')"></button>
    <button class="color-btn" style="background:#a2d2ff" onclick="setBG('#a2d2ff','#bde0fe')"></button>
    <button class="color-btn" style="background:#d8f3dc" onclick="setBG('#d8f3dc','#b7e4c7')"></button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const noBtn = document.getElementById("noBtn");
const msg = document.getElementById("msg");
const card = document.getElementById("card");

let scale = 1;

// fallback smart responses (AI-like)
const fallbackResponses = [
    "Hmm… I feel like you want to say yes 😌",
    "You’re smiling right now, aren’t you? 😏",
    "Be honest… I’m convincing 😎",
    "Okay this is getting interesting 😂",
    "You keep coming back 👀",
    "At this point… it’s fate ❤️",
    "You’re resisting but I see through it 😌",
    "Plot twist: you already like me 😏"
];

// OPTIONAL REAL AI (plug your API later)
async function getAIResponse() {
    try {
        // 🔑 Replace with your API later
        return fallbackResponses[Math.floor(Math.random()*fallbackResponses.length)];
    } catch {
        return fallbackResponses[Math.floor(Math.random()*fallbackResponses.length)];
    }
}

const emojis = ["💖","🥺","😭","😏","❤️","😢","✨","🔥"];

async function moveButton(e) {
    const btnRect = noBtn.getBoundingClientRect();

    const maxX = card.clientWidth - btnRect.width - 20;
    const maxY = card.clientHeight - btnRect.height - 20;

    const x = Math.random() * maxX - (card.clientWidth/2 - btnRect.width/2);
    const y = Math.random() * maxY - (card.clientHeight/2 - btnRect.height/2);

    noBtn.style.transform = `translate(${x}px, ${y}px)`;

    // slower shrink
    scale *= 0.95;
    noBtn.style.scale = scale;

    // AI response
    msg.textContent = await getAIResponse();

    spawnEmoji(e);
}

function spawnEmoji(e) {
    const emoji = document.createElement("div");
    emoji.className = "emoji";
    emoji.textContent = emojis[Math.floor(Math.random()*emojis.length)];

    emoji.style.left = (e.touches ? e.touches[0].clientX : e.clientX) + "px";
    emoji.style.top = (e.touches ? e.touches[0].clientY : e.clientY) + "px";

    document.body.appendChild(emoji);
    setTimeout(() => emoji.remove(), 2000);
}

noBtn.addEventListener("mouseenter", moveButton);
noBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveButton(e);
});

function yesClick() {
    card.innerHTML = `
        <h2>YAYYY 😭❤️</h2>
        <p>You just made my day 💖</p>
    `;

    confetti({
        particleCount: 200,
        spread: 80,
        origin: { y: 0.6 }
    });
}

// background
function setBG(c1, c2) {
    document.body.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
}
function setCustomColor(color) {
    document.body.style.background = color;
}
</script>

</body>
</html>
