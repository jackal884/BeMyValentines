<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Valentine</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #ffe6eb;
        font-family: Arial, sans-serif;
    }

    .card {
        background: white;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        width: 350px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        position: relative;
    }

    img {
        width: 100%;
        border-radius: 15px;
    }

    h2 {
        color: #d6336c;
    }

    .btn {
        margin: 10px;
        padding: 10px 20px;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-size: 16px;
    }

    .yes {
        background: #ff4d6d;
        color: white;
    }

    .no {
        background: #ddd;
        position: absolute;
    }
</style>
</head>

<body>

<div class="card">
    <img src="https://picsum.photos/300/200" alt="img">
    <h2>Will you be my Valentine? ❤️</h2>

    <button class="btn yes" onclick="yesClick()">Yes</button>
    <button class="btn no" id="noBtn">No 😢</button>
</div>

<script>
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * 300 - 100;
    const y = Math.random() * 200 - 100;

    noBtn.style.transform = `translate(${x}px, ${y}px)`;
});

function yesClick() {
    alert("Yayyy ❤️ She said YES!");
}
</script>

</body>
</html>
